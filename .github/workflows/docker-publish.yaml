name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  MASTER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/go-grader-master
  WORKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/go-grader-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata for master (tags, labels)
        id: meta-master
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MASTER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Extract metadata for worker (tags, labels)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push master Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/master/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-master.outputs.tags }}
          labels: ${{ steps.meta-master.outputs.labels }}

      - name: Build and push worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Generate labby token
        id: labby
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LABBY_APP_ID }}
          private-key: ${{ secrets.LABBY_PRIVATE_KEY }}
          owner: CSKU-Lab
          repositories: gitops

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: CSKU-Lab/gitops
          token: ${{ steps.labby.outputs.token }}

      - name: Update go-grader image tags
        run: |
          sed -i "s/imageTag: '.*'/imageTag: '${{ github.ref_name }}'/" apps/go-grader-master/env.libsonnet
          sed -i "s/imageTag: '.*'/imageTag: '${{ github.ref_name }}'/" apps/go-grader-worker/env.libsonnet

      - name: Commit and push
        run: |
          git config user.name "labby[bot]"
          git config user.email "labby[bot]@users.noreply.github.com"
          git add apps/go-grader-master/env.libsonnet apps/go-grader-worker/env.libsonnet
          git commit -m "chore(go-grader): update image tag to ${{ github.ref_name }}"
          git push
